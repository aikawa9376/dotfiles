<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazyAgent Remote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1e1e2e;
      --surface: #181825;
      --overlay: #313244;
      --text:    #cdd6f4;
      --subtle:  #a6adc8;
      --accent:  #89b4fa;
      --green:   #a6e3a1;
      --yellow:  #f9e2af;
      --red:     #f38ba8;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--overlay);
      flex-wrap: wrap;
    }
    header h1 { font-size: 0.9rem; color: var(--text); font-weight: 600; white-space: nowrap; }

    /* ── Agent badges (header) ───────────────────── */
    #status-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      flex: 1;
    }
    .badge {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.15rem 0.55rem;
      background: var(--overlay);
      border-radius: 4px;
      font-size: 0.78rem;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--overlay); flex-shrink: 0;
    }
    .badge.thinking .dot { background: var(--yellow); animation: blink 0.8s ease-in-out infinite; }
    .badge.idle     .dot { background: var(--green); }
    .badge.waiting  .dot { background: var(--accent); animation: blink 1.4s ease-in-out infinite; }
    .badge .label { color: var(--subtle); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── Capture panel ───────────────────────────── */
    #capture-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0.6rem 1rem;
      gap: 0.3rem;
    }
    #capture-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--subtle);
      flex-shrink: 0;
    }
    #capture-header button {
      background: none;
      border: 1px solid var(--overlay);
      color: var(--subtle);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 0.1rem 0.45rem;
      cursor: pointer;
      border-radius: 4px;
    }
    #capture-header button:hover { color: var(--text); }
    #auto-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }
    #capture-wrap { position: relative; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #capture {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--overlay);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      line-height: 1.55;
      overflow: auto;
      white-space: pre;
      color: var(--text);
    }
    #capture-loader {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 1rem;
      background: color-mix(in srgb, var(--yellow) 12%, var(--surface));
      border-top: 2px solid var(--yellow);
      border-radius: 0 0 6px 6px;
      color: var(--yellow);
      font-size: 0.8rem;
      font-weight: 600;
    }
    #capture-loader[hidden] { display: none; }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input bar (bottom) ──────────────────────── */
    #input-bar {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      border-top: 1px solid var(--overlay);
      background: var(--surface);
    }
    .input-row { display: flex; gap: 0.4rem; align-items: center; }
    select, textarea, button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--overlay);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.45rem 0.7rem;
    }
    select { min-width: 120px; height: 34px; cursor: pointer; flex-shrink: 0; }
    textarea {
      width: 100%;
      resize: none;
      height: 68px;
      line-height: 1.55;
    }
    select:focus, textarea:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    #send-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-weight: 700;
      height: 34px;
      padding: 0 1.1rem;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .key-btns { display: flex; gap: 0.2rem; margin-left: auto; }
    .key-btn {
      background: var(--overlay);
      color: var(--text);
      border: 1px solid var(--overlay);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      padding: 0 0.55rem;
      height: 34px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .key-btn:hover { background: color-mix(in srgb, var(--accent) 20%, var(--overlay)); }

    /* ── Mic button ──────────────────────────────── */
    #mic-btn {
      background: var(--overlay);
      color: var(--text);
      border: 1px solid var(--overlay);
      border-radius: 4px;
      font-size: 1.1rem;
      height: 34px;
      padding: 0 0.6rem;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }
    #mic-btn:hover { background: color-mix(in srgb, var(--accent) 20%, var(--overlay)); }
    #mic-btn.recording {
      border-color: var(--red);
      color: var(--red);
      animation: blink 0.6s ease-in-out infinite;
    }
    #mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ LazyAgent</h1>
    <div id="status-bar">
      <span class="badge"><span class="dot"></span><span>connecting…</span></span>
    </div>
  </header>

  <div id="capture-panel">
    <div id="capture-header">
      <span>Terminal Capture</span>
      <span>
        <button id="refresh-btn" type="button">↺ Refresh</button>
        <button id="auto-btn" type="button">Auto</button>
        <span id="capture-time"></span>
      </span>
    </div>
    <div id="capture-wrap">
      <pre id="capture"><span style="color:var(--subtle)">— waiting for output —</span></pre>
      <div id="capture-loader" hidden>
        <span class="spinner">◌</span> thinking…
      </div>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-row">
      <select id="agent-select" title="Target agent">
        <option value="">— agent —</option>
      </select>
      <button type="button" id="send-btn" onclick="sendPrompt()">Send</button>
      <button type="button" id="mic-btn" title="Voice input">🎤</button>
      <div class="key-btns">
        <button class="key-btn" type="button" id="btn-up"    title="Send ↑">🔺</button>
        <button class="key-btn" type="button" id="btn-enter" title="Send Enter">🔸</button>
        <button class="key-btn" type="button" id="btn-down"  title="Send ↓">🔻</button>
      </div>
    </div>
    <textarea id="input" placeholder="Type a prompt… (Ctrl+Enter to send)"></textarea>
  </div>

  <script>
    const MCP = location.origin + '/mcp';
    const EVENTS = location.origin + '/events';

    let reqId = 1;

    // ── MCP helpers ───────────────────────────────────────────────────
    async function rpcCall(method, params) {
      const res = await fetch(MCP, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: reqId++, method, params: params || {} })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      return data.result;
    }

    async function tool(name, args) {
      const result = await rpcCall('tools/call', { name, arguments: args || {} });
      if (result?.content?.[0]?.text) return JSON.parse(result.content[0].text);
      return result;
    }

    // ── Status bar (active agents only) ──────────────────────────────
    function renderStatus(agents) {
      const bar = document.getElementById('status-bar');
      const sel = document.getElementById('agent-select');
      const prevVal = sel.value;

      bar.innerHTML = '';
      sel.innerHTML = '<option value="">— agent —</option>';

      // Only show agents that have an active session
      const active = (agents || []).filter(a => a.status !== 'no_session');

      if (active.length === 0) {
        bar.innerHTML = '<span style="color:var(--subtle);font-size:0.78rem">no active agents</span>';
        return;
      }

      for (const a of active) {
        const badge = document.createElement('div');
        badge.className = 'badge ' + a.status;
        badge.dataset.agent = a.name;
        badge.innerHTML = `<span class="dot"></span><span>${a.name}</span><span class="label">&nbsp;${a.status}</span>`;
        bar.appendChild(badge);

        const opt = document.createElement('option');
        opt.value = a.name;
        opt.textContent = a.name;
        sel.appendChild(opt);
      }

      if (prevVal && [...sel.options].some(o => o.value === prevVal)) {
        sel.value = prevVal;
      } else if (active.length === 1) {
        sel.value = active[0].name;
      }
    }

    function updateBadge(agentName, status, label) {
      const badge = document.querySelector(`.badge[data-agent="${agentName}"]`);
      if (!badge) return;
      badge.className = 'badge ' + status;
      const labelEl = badge.querySelector('.label');
      if (labelEl) labelEl.textContent = '\u00a0' + (label || status);
    }

    // ── Capture ───────────────────────────────────────────────────────
    function stripAnsi(str) {
      return str.replace(/\x1B\[[0-9;]*[A-Za-z]/g, '')
                .replace(/\x1B\][^\x07]*\x07/g, '')
                .replace(/\x1B[@-Z\\-_]/g, '');
    }

    function showCapture(text) {
      setLoading(false);
      const el = document.getElementById('capture');
      el.textContent = text ? stripAnsi(text) : '(empty)';
      el.scrollTop = el.scrollHeight;
      document.getElementById('capture-time').textContent =
        '  ' + new Date().toLocaleTimeString();
    }

    function setLoading(on) {
      document.getElementById('capture-loader').hidden = !on;
    }

    async function fetchCapture(agentName, opts) {
      try {
        const res = await tool('get_terminal_capture', agentName ? { agent_name: agentName } : {});
        showCapture(res?.text ?? '');
      } catch (e) { console.warn('capture error:', e); }
    }

    document.getElementById('refresh-btn').addEventListener('click', () => {
      fetchCapture(document.getElementById('agent-select').value || undefined);
    });

    // ── Auto refresh ──────────────────────────────────────────────────
    let autoTimer = null;
    let autoFetching = false;  // prevent concurrent fetches
    const AUTO_INTERVAL = 4000; // ms

    function setAutoRefresh(on) {
      const btn = document.getElementById('auto-btn');
      if (on) {
        btn.classList.add('active');
        btn.textContent = 'Auto ●';
        if (!autoTimer) {
          autoTimer = setInterval(async () => {
            if (autoFetching) return;
            autoFetching = true;
            const releaseTimer = setTimeout(() => { autoFetching = false; }, 10000);
            try {
              await fetchCapture(document.getElementById('agent-select').value || undefined);
            } finally {
              clearTimeout(releaseTimer);
              autoFetching = false;
            }
          }, AUTO_INTERVAL);
        }
      } else {
        btn.classList.remove('active');
        btn.textContent = 'Auto';
        if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
        autoFetching = false;
      }
    }

    document.getElementById('auto-btn').addEventListener('click', () => {
      setAutoRefresh(!autoTimer);
    });

    // ── SSE event stream ──────────────────────────────────────────────
    async function syncAgentStatus() {
      try {
        const res = await tool('get_agent_status');
        renderStatus(res?.agents || []);
        // If no agent is thinking after sync, clear the loading bar too
        if (!document.querySelector('.badge.thinking')) setLoading(false);
      } catch {}
    }

    function connectSSE() {
      const es = new EventSource(EVENTS);
      es.addEventListener('message', e => {
        let data;
        try { data = JSON.parse(e.data); } catch { return; }
        const { event, agent, capture, message } = data;

        if (event === 'start') {
          updateBadge(agent, 'thinking', 'thinking');
          setLoading(true);
          document.getElementById('capture-time').textContent = '';
        }
        if (event === 'done') {
          updateBadge(agent, 'idle', 'idle');
          capture != null ? showCapture(capture) : fetchCapture(agent);
          const preview = capture ? capture.trim().slice(-80).replace(/\n/g, ' ') : '';
          notify(`✅ ${agent} done`, preview);
        }
        if (event === 'waiting') {
          updateBadge(agent, 'waiting', message || 'waiting');
          setLoading(false);
          capture != null ? showCapture(capture) : fetchCapture(agent);
        }
      });
      es.onerror = () => {
        es.close();
        setTimeout(() => {
          // Re-sync badge state after reconnect to clear any stale 'thinking' badges
          syncAgentStatus();
          connectSSE();
        }, 3000);
      };
    }

    // ── Key buttons ───────────────────────────────────────────────────
    async function sendKey(key) {
      const agent = document.getElementById('agent-select').value;
      const args = { key };
      if (agent) args.agent_name = agent;
      try {
        await tool('send_key', args);
        if (key === 'Up' || key === 'Down') await fetchCapture(agent || undefined);
      } catch (e) { console.warn('send_key error:', e); }
    }

    document.getElementById('btn-up').addEventListener('click',    () => sendKey('Up'));
    document.getElementById('btn-enter').addEventListener('click', () => sendKey('Enter'));
    document.getElementById('btn-down').addEventListener('click',  () => sendKey('Down'));

    // ── Send ──────────────────────────────────────────────────────────
    async function sendPrompt() {
      const text = document.getElementById('input').value.trim();
      const agent = document.getElementById('agent-select').value;
      if (!text) return;

      try {
        const args = { text };
        if (agent) args.agent_name = agent;
        await tool('send_to_agent', args);
        document.getElementById('input').value = '';
        setLoading(true);
        document.getElementById('capture-time').textContent = '';
        await new Promise(r => setTimeout(r, 150));
        const enterArgs = { key: 'Enter' };
        if (agent) enterArgs.agent_name = agent;
        await tool('send_key', enterArgs);
      } catch (err) {
        alert('Send error: ' + err.message);
      }
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendPrompt(); }
    });

    // ── Browser notifications ─────────────────────────────────────────
    function requestNotifyPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    function notify(title, body) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      if (!document.hidden) return; // only when tab is in background
      const n = new Notification(title, {
        body,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">⚡</text></svg>',
        tag: 'lazyagent-done',
      });
      n.onclick = () => { window.focus(); n.close(); };
    }

    // ── Voice input ───────────────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById('mic-btn');
    let recognition = null;

    const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    if (!SpeechRecognition || !isSecure) {
      micBtn.disabled = true;
      micBtn.title = !SpeechRecognition
        ? 'Voice input not supported in this browser'
        : 'Voice input requires HTTPS (not available over HTTP on this device)';
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = navigator.language || 'ja-JP';

      recognition.onresult = e => {
        const transcript = e.results[0][0].transcript;
        const ta = document.getElementById('input');
        ta.value = (ta.value ? ta.value + ' ' : '') + transcript;
        ta.focus();
      };
      recognition.onend = () => micBtn.classList.remove('recording');
      recognition.onerror = e => {
        micBtn.classList.remove('recording');
        if (e.error === 'not-allowed') micBtn.disabled = true;
      };

      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('recording')) {
          recognition.stop();
        } else {
          micBtn.classList.add('recording');
          recognition.start();
        }
      });
    }

    // ── Init ──────────────────────────────────────────────────────────
    async function init() {
      requestNotifyPermission();
      try {
        await rpcCall('initialize', {
          protocolVersion: '2025-03-26', capabilities: {},
          clientInfo: { name: 'lazyagent-webui', version: '0.1.0' }
        });
      } catch {}
      try {
        const res = await tool('get_agent_status');
        renderStatus(res?.agents || []);
      } catch {}
      connectSSE();
    }

    init();
  </script>
</body>
</html>
